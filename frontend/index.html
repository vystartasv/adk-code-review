<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trusted Code Review Pipeline</title>
<style>
  :root {
    --bg: #f8f9fa;
    --card-bg: #ffffff;
    --border: #e2e8f0;
    --text: #1a202c;
    --muted: #718096;
    --green: #38a169;
    --red: #e53e3e;
    --yellow: #d69e2e;
    --blue: #3182ce;
    --purple: #805ad5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }
  .container { max-width: 800px; margin: 0 auto; padding: 2rem 1rem; }
  header { text-align: center; margin-bottom: 2rem; }
  header h1 { font-size: 1.8rem; color: var(--blue); }
  header p { color: var(--muted); font-size: 0.95rem; }

  .input-group { display: flex; gap: 0.5rem; margin-bottom: 2rem; }
  .input-group input {
    flex: 1; padding: 0.75rem 1rem; border: 2px solid var(--border);
    border-radius: 8px; font-size: 1rem; outline: none;
  }
  .input-group input:focus { border-color: var(--blue); }
  .input-group button {
    padding: 0.75rem 1.5rem; background: var(--blue); color: white;
    border: none; border-radius: 8px; font-size: 1rem; cursor: pointer;
    font-weight: 600;
  }
  .input-group button:hover { background: #2b6cb0; }
  .input-group button:disabled { opacity: 0.5; cursor: not-allowed; }

  .pipeline {
    display: flex; flex-direction: column; gap: 1rem; margin-bottom: 2rem;
  }
  .agent-card {
    background: var(--card-bg); border: 2px solid var(--border);
    border-radius: 12px; padding: 1.25rem; transition: all 0.3s;
  }
  .agent-card.active { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(49,130,206,0.15); }
  .agent-card.completed { border-color: var(--green); }
  .agent-card.error { border-color: var(--red); }
  .agent-header {
    display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem;
  }
  .agent-icon {
    width: 40px; height: 40px; border-radius: 10px; display: flex;
    align-items: center; justify-content: center; font-size: 1.2rem;
    font-weight: bold; color: white;
  }
  .agent-icon.planner { background: var(--blue); }
  .agent-icon.security { background: var(--red); }
  .agent-icon.quality { background: var(--yellow); }
  .agent-icon.archive { background: var(--purple); }
  .agent-name { font-weight: 700; font-size: 1.05rem; }
  .agent-status {
    margin-left: auto; font-size: 0.8rem; padding: 0.2rem 0.6rem;
    border-radius: 12px; font-weight: 600;
  }
  .agent-status.waiting { background: #edf2f7; color: var(--muted); }
  .agent-status.running { background: #ebf8ff; color: var(--blue); }
  .agent-status.done { background: #f0fff4; color: var(--green); }
  .agent-status.failed { background: #fff5f5; color: var(--red); }
  .agent-detail { font-size: 0.9rem; color: var(--muted); }
  .agent-findings { margin-top: 0.75rem; font-size: 0.85rem; }
  .finding { padding: 0.3rem 0.6rem; border-radius: 4px; margin: 0.25rem 0; }
  .finding.critical { background: #fff5f5; border-left: 3px solid var(--red); }
  .finding.high { background: #fffaf0; border-left: 3px solid var(--yellow); }
  .finding.medium { background: #fffff0; border-left: 3px solid #ecc94b; }

  .report { background: var(--card-bg); border-radius: 12px; padding: 1.5rem; }
  .report h2 { font-size: 1.2rem; margin-bottom: 1rem; }
  .report-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 0.75rem; }
  .stat { background: #f7fafc; padding: 0.75rem; border-radius: 8px; text-align: center; }
  .stat-value { font-size: 1.5rem; font-weight: 700; }
  .stat-value.trusted { color: var(--green); }
  .stat-value.caution { color: var(--yellow); }
  .stat-value.untrusted { color: var(--red); }
  .stat-label { font-size: 0.8rem; color: var(--muted); }

  .chain-badge {
    display: inline-flex; align-items: center; gap: 0.25rem;
    font-size: 0.75rem; padding: 0.2rem 0.5rem; border-radius: 6px;
    background: #f0fff4; color: var(--green); margin-top: 0.75rem;
  }

  .meta { text-align: center; font-size: 0.8rem; color: var(--muted); margin-top: 2rem; }
  .meta a { color: var(--blue); }

  pre { font-size: 0.8rem; max-height: 300px; overflow: auto; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🔐 Trusted Code Review Pipeline</h1>
    <p>4 specialized agents · Ed25519-signed · A2A protocol · Trust score chain</p>
  </header>

  <div class="input-group">
    <input type="text" id="repoUrl" placeholder="Enter GitHub repo URL..." value="https://github.com/vystartasv/agent-foundry">
    <button id="runBtn" onclick="runPipeline()">▶ Review</button>
  </div>

  <div class="pipeline" id="pipeline"></div>
  <div class="report" id="report" style="display:none"></div>

  <div class="meta">
    Built with <a href="https://google.github.io/adk-docs/" target="_blank">Google ADK</a> + 
    <a href="https://workswithagents.dev" target="_blank">Works With Agents</a> · 
    CC BY 4.0
  </div>
</div>

<script>
const AGENTS = [
  {id:'planner', name:'Planner', icon:'P', cls:'planner', desc:'Analyzing repo structure'},
  {id:'security', name:'Security Scanner', icon:'🔒', cls:'security', desc:'Scanning for vulnerabilities'},
  {id:'quality', name:'Quality Gate', icon:'✅', cls:'quality', desc:'Running quality checks'},
  {id:'archive', name:'Archive & Verify', icon:'📋', cls:'archive', desc:'Rating agents, verifying signatures'},
];

function renderPipeline(state) {
  const el = document.getElementById('pipeline');
  el.innerHTML = AGENTS.map((a, i) => {
    const s = state[a.id] || 'waiting';
    const statusLabels = {waiting:'Waiting', running:'Running...', done:'✓ Done', failed:'✗ Failed'};
    return `<div class="agent-card ${s === 'running' ? 'active' : ''} ${s === 'done' ? 'completed' : ''} ${s === 'failed' ? 'error' : ''}">
      <div class="agent-header">
        <div class="agent-icon ${a.cls}">${a.icon}</div>
        <div class="agent-name">${a.name}</div>
        <div class="agent-status ${s}">${statusLabels[s] || s}</div>
      </div>
      <div class="agent-detail">${a.desc}</div>
      <div class="agent-findings" id="findings-${a.id}"></div>
    </div>`;
  }).join('');
}

function updateFindings(agentId, html) {
  const el = document.getElementById(`findings-${agentId}`);
  if (el) el.innerHTML = html;
}

function showReport(data) {
  const el = document.getElementById('report');
  el.style.display = 'block';
  el.innerHTML = `
    <h2>📊 Audit Report</h2>
    <div class="report-grid">
      <div class="stat"><div class="stat-value">${data.total_files || '?'}</div><div class="stat-label">Files analyzed</div></div>
      <div class="stat"><div class="stat-value">${data.findings_count || 0}</div><div class="stat-label">Security findings</div></div>
      <div class="stat"><div class="stat-value ${data.quality_tier || ''}">${data.quality_score || '?'}/100</div><div class="stat-label">Quality score</div></div>
      <div class="stat"><div class="stat-value trusted">${data.verified ? '✓' : '✗'}</div><div class="stat-label">Signatures verified</div></div>
    </div>
    <div class="chain-badge">🔗 Trust Score Chain · ${data.agents_rated || 0}/4 agents rated</div>
    ${data.summary ? `<p style="margin-top:1rem;font-size:0.9rem;">${data.summary}</p>` : ''}
  `;
}

async function runPipeline() {
  const url = document.getElementById('repoUrl').value.trim() || 'https://github.com/vystartasv/agent-foundry';
  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.textContent = 'Running...';

  // Reset
  const state = {};
  AGENTS.forEach(a => state[a.id] = 'waiting');
  renderPipeline(state);

  try {
    // Simulated progress — the actual pipeline runs via CLI (python clients/pipeline_client.py)
    // or through the ADK web UI when deployed to Cloud Run.
    for (const agent of AGENTS) {
      state[agent.id] = 'running'; renderPipeline(state);
      await new Promise(r => setTimeout(r, 600 + Math.random() * 800));
      state[agent.id] = 'done'; renderPipeline(state);
    }

    updateFindings('planner', '📁 81 files · 4 key files · Primary: Python · Has tests: Yes');
    updateFindings('security',
      '<div class="finding high">[HIGH] hardcoded_secret: tests/test_m365.py</div>' +
      '<div class="finding critical">[CRITICAL] sql_injection_risk: src/foundry/observability.py</div>');
    updateFindings('quality', 'Score: 80/100 (TRUSTED) · 4/5 checks passed');
    updateFindings('archive', '✓ All agents rated · Trust score chain complete · Ed25519 signatures verified');

    showReport({
      total_files: 81,
      findings_count: 3,
      quality_score: 80,
      quality_tier: 'trusted',
      verified: true,
      agents_rated: 4,
      summary: `Pipeline completed for ${url}. 81 files analyzed. 3 security issues found. Quality score: 80/100.`
    });

  } catch (e) {
    console.error('Pipeline error:', e);
    updateFindings('archive', `<div class="finding critical">Error: ${e.message}</div>`);
  } finally {
    btn.disabled = false;
    btn.textContent = '▶ Review';
  }
}

// Initial render
renderPipeline({});
</script>
</body>
</html>
